# Prevent flameshot from causing fullscreen state on the window that regains focus
# btop larger than default floating TUI size
windowrule = size 1006 690, match:class ^org\.omarchy\.btop$

# Workspace assignments — mirrors startup layout
# windowrule = workspace 1 silent, match:class ^chromium$
windowrule = workspace 3 silent, match:class ^obsidian$
windowrule = workspace 4 silent, match:class ^org\.telegram\.desktop$
windowrule = workspace 4 silent, match:class ^chrome-discord\.com.*$
windowrule = workspace 5 silent, match:class ^chrome-chat\.deepseek\.com.*$
windowrule = workspace 5 silent, match:class ^chrome-chatgpt\.com.*$
windowrule = workspace 5 silent, match:class ^chrome-claude\.ai.*$
windowrule = workspace 5 silent, match:class ^chrome-www\.kimi\.com.*$
