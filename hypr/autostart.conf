# Extra autostart processes
exec-once = wl-clip-persist --clipboard both

# Startup layout
exec-once = uwsm-app -- chromium                                                            # workspace 1
exec-once = uwsm-app -- ghostty                                                             # workspace 2
exec-once = uwsm-app -- obsidian -disable-gpu --enable-wayland-ime                         # workspace 3
exec-once = uwsm-app -- Telegram                                                            # workspace 4
exec-once = omarchy-launch-webapp "https://discord.com/channels/@me"                       # workspace 4
exec-once = omarchy-launch-webapp "https://chat.deepseek.com"                              # workspace 5
exec-once = omarchy-launch-webapp "https://chatgpt.com"                                    # workspace 5
exec-once = omarchy-launch-webapp "https://claude.ai/new"                                  # workspace 5
exec-once = omarchy-launch-webapp "https://www.kimi.com/en"                                # workspace 5
exec-once = ~/.config/hypr/scripts/startup-groups.sh
