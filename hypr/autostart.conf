# Extra autostart processes
exec-once = wl-clip-persist --clipboard both
exec-once = systemctl --user restart waybar.service

# Start on workspace 1
exec-once = hyprctl dispatch workspace 1

# Scratchpad terminal
exec-once = hyprctl dispatch exec [workspace special:scratchpad silent] ghostty

# Startup layout
exec-once = uwsm-app -- chromium about:blank                                                # workspace 1
exec-once = hyprctl dispatch exec [workspace 2 silent] ghostty                              # workspace 2
exec-once = uwsm-app -- obsidian -disable-gpu --enable-wayland-ime                         # workspace 3
exec-once = uwsm-app -- Telegram                                                            # workspace 4
exec-once = hyprctl dispatch exec [workspace 4 silent] /usr/bin/discord                    # workspace 4
